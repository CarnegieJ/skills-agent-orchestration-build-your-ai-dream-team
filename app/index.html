<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Pulse</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1>Project Pulse</h1>
      <p class="tagline">Real-time health of Mona's projects</p>
    </div>
  </header>

  <main class="dashboard" id="dashboard">
    <p class="loading">Loading projects…</p>
  </main>

  <script>
    function getPriorityClass(priority) {
      const map = { 'High': 'priority--high', 'Medium': 'priority--medium', 'Low': 'priority--low' };
      return map[priority] || '';
    }

    function renderCard(project) {
      const name = project.name ?? 'Untitled Project';
      const owner = project.owner ?? 'Unknown';
      const status = project.status ?? 'Unknown';
      const priority = project.priority ?? 'Unknown';
      const recentActivity = project.recentActivity ?? 'No recent activity.';
      const description = project.description ?? '';
      const lastUpdated = project.lastUpdated ?? 'N/A';
      const priorityClass = getPriorityClass(priority);

      const card = document.createElement('article');
      card.className = 'project-card';
      card.innerHTML = `
        <div class="card-header">
          <h2 class="card-title">${name}</h2>
          <span class="status-badge status-${status.toLowerCase().replace(/\s+/g, '-')}">${status}</span>
        </div>
        <p class="card-description">${description}</p>
        <dl class="card-meta">
          <dt>Owner</dt><dd>${owner}</dd>
          <dt>Recent activity</dt><dd>${recentActivity}</dd>
          <dt>Last updated</dt><dd>${lastUpdated}</dd>
        </dl>
        <div class="card-footer">
          <span class="priority ${priorityClass}">&#9650; ${priority}</span>
        </div>
      `;
      return card;
    }

    const dashboard = document.getElementById('dashboard');

    fetch('project-data.json')
      .then(function(response) {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(function(data) {
        dashboard.innerHTML = '';
        const projects = data.projects;
        if (!projects || projects.length === 0) {
          dashboard.innerHTML = '<p>No projects found.</p>';
          return;
        }
        projects.forEach(function(project) {
          dashboard.appendChild(renderCard(project));
        });
      })
      .catch(function(err) {
        dashboard.innerHTML = '<p class="error">Could not load project data. Please open this page via a local server (e.g., using the <strong>Run Project Pulse Dashboard</strong> launch configuration).</p>';
      });
  </script>
</body>
</html>
